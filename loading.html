<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day Dreaming — Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="CSS/loading.css">
</head>

<body>
    <main class="hero">
        <!-- atmospheric elements -->
        <div class="sun-glow"></div>
        <div class="horizon-line"></div>

        <!-- clouds -->
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
        <div class="cloud cloud-5"></div>
        <div class="cloud cloud-6"></div>

        <!-- loading content -->
        <div class="loading-wrap">
            <p class="eyebrow">drifting into your space</p>

            <!-- animated birds -->
            <div class="birds-container" aria-hidden="true">
                <div class="bird bird-1">
                    <svg width="18" height="10" viewBox="0 0 18 10">
                        <path d="M1 5 Q4.5 1 9 5 Q13.5 1 17 5"/>
                    </svg>
                </div>
                <div class="bird bird-2" style="top:8px; left:12px;">
                    <svg width="14" height="8" viewBox="0 0 14 8">
                        <path d="M1 4 Q3.5 1 7 4 Q10.5 1 13 4"/>
                    </svg>
                </div>
                <div class="bird bird-3" style="top:2px; left:28px;">
                    <svg width="12" height="7" viewBox="0 0 12 7">
                        <path d="M1 3.5 Q3 1 6 3.5 Q9 1 11 3.5"/>
                    </svg>
                </div>
                <div class="bird bird-4" style="top:14px; left:6px;">
                    <svg width="10" height="6" viewBox="0 0 10 6">
                        <path d="M1 3 Q2.5 1 5 3 Q7.5 1 9 3"/>
                    </svg>
                </div>
            </div>

            <h1 class="loading-title">gathering clouds</h1>
            <p class="loading-sub">just a moment</p>

            <!-- progress bar -->
            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-dot" id="progressDot"></div>
            </div>

            <p class="progress-pct" id="progressPct">0</p>

            <!-- rotating phrase -->
            <p class="loading-phrase" id="loadingPhrase">
                <span class="phrase-inner" id="phraseInner">letting the light in…</span>
            </p>

            <div class="divider"></div>
        </div>
    </main>

   <script src="JS/loading.js"></script>
</body>
</html>
